<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cabrona – Cocina</title>
<style>
:root{--gold:#f5a623;--dark:#0a0a0a;--card:#1a1a1a;--border:#2a2a2a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:#fff;min-height:100vh}
.hdr{background:#1a0500;border-bottom:3px solid #e74c3c;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:12px}
.badge{background:#e74c3c;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.title{font-size:20px;font-weight:800;color:#e74c3c}
.clock{font-size:14px;color:rgba(255,255,255,0.5);font-variant-numeric:tabular-nums}
.pending-count{background:#e74c3c;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:20px}
.card{background:var(--card);border-radius:14px;border:2px solid var(--border);overflow:hidden;transition:border-color .2s}
.card.nuevo{border-color:#e74c3c;animation:pulse 1s ease-in-out 3}
@keyframes pulse{0%,100%{border-color:#e74c3c}50%{border-color:#ff8a80}}
.card-hdr{background:#2a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #3a1a1a}
.mesa-info{font-size:13px;font-weight:700;color:#e74c3c}
.ronda-info{font-size:11px;color:rgba(255,255,255,0.5)}
.hora-info{font-size:11px;color:rgba(255,255,255,0.4)}
.card-body{padding:14px 16px}
.prod-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #222}
.prod-item:last-child{border-bottom:none}
.prod-qty{background:#e74c3c;color:#fff;font-size:12px;font-weight:700;min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prod-name{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.prod-notes{font-size:11px;color:var(--gold);margin-top:3px;display:block}
.card-footer{padding:10px 16px;background:#111;display:flex;gap:8px}
.btn-listo{flex:1;padding:10px;background:#4ade80;color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-listo:active{opacity:.8}
.btn-cancel{padding:10px 16px;background:none;color:#666;border:1px solid #333;border-radius:8px;font-size:12px;cursor:pointer}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:#333;gap:12px}
.empty-icon{font-size:60px}
.empty-txt{font-size:16px}
.status-bar{background:#111;border-top:1px solid #222;padding:10px 20px;display:flex;align-items:center;gap:16px;font-size:11px;color:#555}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="badge">🍽️ Cocina</div>
    <div class="title">La Cabrona</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="pending-count" id="cnt">0</div>
    <div class="clock" id="clock">00:00</div>
  </div>
</div>

<div id="grid" class="grid">
  <div class="empty"><div class="empty-icon">✅</div><div class="empty-txt">Todo listo — sin pedidos pendientes</div></div>
</div>

<div class="status-bar">
  <div class="dot"></div>
  <span>Conectado en tiempo real</span>
  <span style="margin-left:auto">La Cabrona Alitas & Beer · Cocina</span>
</div>

<script>
// INSTRUCCIONES: Reemplaza FIREBASE_URL con tu URL de Firebase Realtime Database
const FIREBASE_URL='https://TU-FIREBASE-URL.firebaseio.com';
const NOMBRES={alita5:'Alitas 5 pzas',alita10:'Alitas 10 pzas',bone5:'Boneless 5 pzas',bone10:'Boneless 10 pzas',hsirloin:'Hamburguesa Sirloin',hpollo:'Hamburguesa Pollo',hres:'Hamburguesa Res',hcamaron:'Hamburguesa Camarón',hcmt:'Cielo mar y tierra',hmega:'Mega Hamburguesa',papas:'Papas gajo/francesa',hotdog:'Hot Dog sencillo',hotdogp:'Hot Dog c/papas',nachos:'Nachos',aros:'Aros de cebolla',dedos:'Dedos de queso',botchica:'Botana chica',botgrande:'Botana grande',jalap:'Jalapeños rellenos',tosti:'Tostitos',papasdor:'Papas doradas',palomitas:'Palomitas',duritos:'Duritos'};
const COCINA_KEYS=Object.keys(NOMBRES);
let pedidos={};

function clock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
setInterval(clock,1000);clock();

function escucharFirebase(){
  if(FIREBASE_URL.includes('TU-FIREBASE')){mostrarDemo();return;}
  function poll(){
    fetch(FIREBASE_URL+'/pedidos.json?orderBy="estado"&equalTo="pendiente"')
      .then(r=>r.json()).then(data=>{pedidos=data||{};renderGrid();})
      .catch(()=>{});
  }
  poll();setInterval(poll,3000);
}

function mostrarDemo(){
  pedidos={
    'demo1':{r:1,mesa:'Mesa 1',area:'Principal',hora:'20:15',estado:'pendiente',items:[{k:'alita10',q:2,notes:['Salsa: BBQ','Sin zanahoria']},{k:'nachos',q:1,notes:[]}]},
    'demo2':{r:1,mesa:'Mesa T-3',area:'Terraza',hora:'20:18',estado:'pendiente',items:[{k:'hsirloin',q:1,notes:['Papas gajo','Sin cebolla']},{k:'papas',q:1,notes:['Bien doradas','Sin lemon pepper']}]},
    'demo3':{r:2,mesa:'Sillón 1-2',area:'Principal',hora:'20:22',estado:'pendiente',items:[{k:'bone5',q:3,notes:['Salsa: Bufalo Ranch','Sin apio']}]}
  };
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const keys=Object.keys(pedidos).filter(k=>pedidos[k]&&pedidos[k].estado==='pendiente');
  document.getElementById('cnt').textContent=keys.length;
  if(!keys.length){grid.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div class="empty-txt">Todo listo — sin pedidos pendientes</div></div>';return;}
  grid.innerHTML=keys.map(id=>{
    const p=pedidos[id];
    const items=p.items.filter(i=>COCINA_KEYS.includes(i.k));
    if(!items.length)return '';
    return `<div class="card nuevo" id="card-${id}">
      <div class="card-hdr">
        <div><div class="mesa-info">📍 ${p.mesa} · ${p.area}</div><div class="ronda-info">Ronda ${p.r}</div></div>
        <div class="hora-info">${p.hora||''}</div>
      </div>
      <div class="card-body">
        ${items.map(i=>`<div class="prod-item"><div class="prod-qty">${i.q}</div><div class="prod-name">${NOMBRES[i.k]||i.k}${i.notes&&i.notes.length?'<span class="prod-notes">'+i.notes.join(' · ')+'</span>':''}</div></div>`).join('')}
      </div>
      <div class="card-footer">
        <button class="btn-listo" onclick="marcarListo('${id}')">✓ Listo para entregar</button>
        <button class="btn-cancel" onclick="eliminar('${id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function marcarListo(id){
  if(FIREBASE_URL.includes('TU-FIREBASE')){delete pedidos[id];renderGrid();return;}
  fetch(FIREBASE_URL+'/pedidos/'+id+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:'listo'})}).then(()=>{delete pedidos[id];renderGrid();});
}

function eliminar(id){delete pedidos[id];renderGrid();}
escucharFirebase();
</script>
</body>
</html>
