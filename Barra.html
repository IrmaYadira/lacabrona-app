<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cabrona – Barra</title>
<style>
:root{--gold:#f5a623;--dark:#0a0a0a;--card:#1a1a1a;--border:#2a2a2a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:#fff;min-height:100vh}
.hdr{background:#0a0a1a;border-bottom:3px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.badge{background:var(--gold);color:#000;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.title{font-size:20px;font-weight:800;color:var(--gold)}
.clock{font-size:14px;color:rgba(255,255,255,0.5)}
.pending-count{background:var(--gold);color:#000;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:20px}
.card{background:var(--card);border-radius:14px;border:2px solid var(--border);overflow:hidden;transition:border-color .2s}
.card.nuevo{border-color:var(--gold);animation:pulse 1s ease-in-out 3}
@keyframes pulse{0%,100%{border-color:var(--gold)}50%{border-color:#fff3cd}}
.card-hdr{background:#1a1500;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2000}
.mesa-info{font-size:13px;font-weight:700;color:var(--gold)}
.ronda-info{font-size:11px;color:rgba(255,255,255,0.5)}
.hora-info{font-size:11px;color:rgba(255,255,255,0.4)}
.card-body{padding:14px 16px}
.prod-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #222}
.prod-item:last-child{border-bottom:none}
.prod-qty{background:var(--gold);color:#000;font-size:12px;font-weight:700;min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prod-name{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.card-footer{padding:10px 16px;background:#111;display:flex;gap:8px}
.btn-listo{flex:1;padding:10px;background:var(--gold);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-listo:active{opacity:.8}
.btn-cancel{padding:10px 16px;background:none;color:#666;border:1px solid #333;border-radius:8px;font-size:12px;cursor:pointer}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:#333;gap:12px}
.empty-icon{font-size:60px}
.status-bar{background:#111;border-top:1px solid #222;padding:10px 20px;display:flex;align-items:center;gap:16px;font-size:11px;color:#555}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="badge">🍺 Barra</div>
    <div class="title">La Cabrona</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="pending-count" id="cnt">0</div>
    <div class="clock" id="clock">00:00</div>
  </div>
</div>

<div id="grid" class="grid">
  <div class="empty"><div class="empty-icon">✅</div><div style="font-size:16px;color:#333">Sin pedidos pendientes</div></div>
</div>

<div class="status-bar">
  <div class="dot"></div>
  <span>Conectado en tiempo real</span>
  <span style="margin-left:auto">La Cabrona · Barra</span>
</div>

<script>
const FIREBASE_URL='https://TU-FIREBASE-URL.firebaseio.com';
const NOMBRES={tarroOsc:'Tarro oscura',tarroCla:'Tarro clara',media:'Media cerveza',modelo:'Modelo 1/2',pacifico:'Medio Pacífico',mega:'Mega cerveza',megapac:'Mega Pacífico',michelob:'Michelob Ultra',caguama:'Caguama',cubeta:'Cubeta Corona (10)',cubeta2:'Cubeta Tecate (10)',sky30:'Sky/Centenario 30ml',skyprep:'Sky prep.',azul30:'Azul/7Leguas 30ml',azulprep:'Azul prep.',maestro30:'Maestro Doble',absolut:'Absolut Vodka',charro:'Charro negro/güero',azulit:'Azulitos 1/2 lt',redbull:'Red Bull',mich1lt:'Michelada 1 lt',michcam:'Michelada c/camarón',vasochel:'Vaso chelado',vasomich:'Vaso michelado',clam12:'Clamatado 1/2',clamcomp:'Clamatado completo',caguamap:'Caguama preparada',rusa:'Rusa/Agua mineral',lata:'Lata refresco',newmix:'New Mix',jugo:'Vaso de jugo',suero:'Suero Electrolit',te:'Té Arizona',bolis:'Bolis de tejuino'};
const BARRA_KEYS=Object.keys(NOMBRES);
let pedidos={};

function clock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
setInterval(clock,1000);clock();

function escucharFirebase(){
  if(FIREBASE_URL.includes('TU-FIREBASE')){mostrarDemo();return;}
  function poll(){fetch(FIREBASE_URL+'/pedidos.json').then(r=>r.json()).then(data=>{pedidos=data||{};renderGrid();}).catch(()=>{});}
  poll();setInterval(poll,3000);
}

function mostrarDemo(){
  pedidos={
    'demo1':{r:1,mesa:'Mesa 1',area:'Principal',hora:'20:15',estado:'pendiente',items:[{k:'mega',q:3,notes:[]},{k:'charro',q:2,notes:[]},{k:'mich1lt',q:1,notes:[]}]},
    'demo2':{r:1,mesa:'Mesa T-2',area:'Terraza',hora:'20:19',estado:'pendiente',items:[{k:'cubeta',q:1,notes:[]},{k:'vasomich',q:4,notes:[]}]},
    'demo3':{r:2,mesa:'Sillón 5',area:'Fumar 2',hora:'20:25',estado:'pendiente',items:[{k:'azulprep',q:2,notes:[]},{k:'lata',q:3,notes:[]}]}
  };
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const keys=Object.keys(pedidos).filter(k=>pedidos[k]&&pedidos[k].estado==='pendiente');
  document.getElementById('cnt').textContent=keys.length;
  if(!keys.length){grid.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div style="font-size:16px;color:#333">Sin pedidos pendientes</div></div>';return;}
  grid.innerHTML=keys.map(id=>{
    const p=pedidos[id];
    const items=p.items.filter(i=>BARRA_KEYS.includes(i.k));
    if(!items.length)return '';
    return `<div class="card nuevo" id="card-${id}">
      <div class="card-hdr">
        <div><div class="mesa-info">📍 ${p.mesa} · ${p.area}</div><div class="ronda-info">Ronda ${p.r}</div></div>
        <div class="hora-info">${p.hora||''}</div>
      </div>
      <div class="card-body">
        ${items.map(i=>`<div class="prod-item"><div class="prod-qty">${i.q}</div><div class="prod-name">${NOMBRES[i.k]||i.k}</div></div>`).join('')}
      </div>
      <div class="card-footer">
        <button class="btn-listo" onclick="marcarListo('${id}')">✓ Servido</button>
        <button class="btn-cancel" onclick="eliminar('${id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function marcarListo(id){
  if(FIREBASE_URL.includes('TU-FIREBASE')){delete pedidos[id];renderGrid();return;}
  fetch(FIREBASE_URL+'/pedidos/'+id+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:'servido'})}).then(()=>{delete pedidos[id];renderGrid();});
}
function eliminar(id){delete pedidos[id];renderGrid();}
escucharFirebase();
</script>
</body>
</html>
